<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIRVO AI — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:#080808;color:#fff;font-family:'Outfit',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes wave { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
  @keyframes pulseRing { 0%{transform:scale(0.9);opacity:0.7} 70%{transform:scale(1.25);opacity:0} 100%{opacity:0} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes typingDot { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(212,175,55,0.15)} 50%{box-shadow:0 0 40px rgba(212,175,55,0.3)} }

  .blob-1 { position:fixed;top:-150px;right:-150px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,0.06) 0%,transparent 70%);pointer-events:none;z-index:0; }
  .blob-2 { position:fixed;bottom:-100px;left:-100px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(212,84,126,0.06) 0%,transparent 70%);pointer-events:none;z-index:0; }

  /* NAVBAR */
  .navbar { display:flex;align-items:center;justify-content:space-between;padding:12px 40px;border-bottom:0.5px solid rgba(255,255,255,0.06);background:rgba(8,8,8,0.96);backdrop-filter:blur(14px);z-index:10;flex-shrink:0; }
  .nav-link { font-size:13px;color:rgba(255,255,255,0.4);text-decoration:none;transition:color 0.2s; }
  .nav-link:hover,.nav-link.active { color:#D4AF37; }

  /* MODE SELECTOR */
  .mode-bar { display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 40px;border-bottom:0.5px solid rgba(255,255,255,0.05);background:rgba(8,8,8,0.9);flex-shrink:0;z-index:9; }
  .mode-btn { padding:7px 18px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.25s;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);background:transparent;font-family:'Outfit',sans-serif;letter-spacing:0.04em; }
  .mode-btn.active { background:rgba(212,175,55,0.14);border-color:rgba(212,175,55,0.4);color:#D4AF37; }
  .mode-btn:hover { border-color:rgba(212,175,55,0.3);color:#D4AF37; }

  /* MAIN LAYOUT */
  .main { display:flex;flex:1;overflow:hidden; }

  /* NIRVO AVATAR PANEL */
  .avatar-panel { width:260px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;border-right:0.5px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2); }

  .avatar-body { width:140px;height:190px;border-radius:50% 50% 30% 30% / 40% 40% 60% 60%;background:linear-gradient(160deg,#1c1c1c,#0d0d0d);border:1px solid rgba(212,175,55,0.15);position:relative;animation:float 4s ease-in-out infinite;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:18px; }
  .avatar-body.speaking { border-color:rgba(212,175,55,0.5);animation:float 4s ease-in-out infinite, glow 2s ease infinite; }

  .avatar-head { position:absolute;top:12px;width:60px;height:64px;border-radius:50% 50% 40% 40%;background:linear-gradient(160deg,#1e1e1e,#111);border:1px solid rgba(212,175,55,0.12); }
  .avatar-headband { position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:66px;height:8px;border-radius:4px;background:linear-gradient(90deg,#D4AF37,#F7C948,#D4AF37); }
  .avatar-cup-l { position:absolute;top:4px;left:-8px;width:9px;height:14px;border-radius:3px;background:#D4AF37;opacity:0.8; }
  .avatar-cup-r { position:absolute;top:4px;right:-8px;width:9px;height:14px;border-radius:3px;background:#D4AF37;opacity:0.8; }
  .avatar-eye { width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#F7C948,#D4AF37);box-shadow:0 0 8px rgba(212,175,55,0.7); }
  .avatar-eyes { position:absolute;top:22px;left:50%;transform:translateX(-50%);display:flex;gap:14px; }
  .avatar-badge { padding:3px 10px;background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.28);border-radius:12px;font-size:7px;color:#D4AF37;letter-spacing:0.12em;white-space:nowrap; }

  .nirvo-name { font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#D4AF37;text-align:center; }
  .nirvo-status { font-size:11px;color:rgba(255,255,255,0.3);text-align:center;letter-spacing:0.08em; }

  /* Wave under avatar */
  .avatar-wave { display:flex;align-items:center;gap:2px;height:24px; }
  .avatar-wave-bar { width:2px;border-radius:1px;background:linear-gradient(180deg,#D4AF37,#F7C948);transition:height 0.3s; }
  .avatar-wave-bar.active { animation:wave 1.1s ease-in-out infinite; }

  /* CHAT AREA */
  .chat-area { flex:1;display:flex;flex-direction:column;overflow:hidden; }
  .messages { flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:16px; }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-track { background:transparent; }
  .messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1);border-radius:2px; }

  /* Message bubbles */
  .msg { display:flex;gap:10px;animation:fadeUp 0.4s ease forwards;opacity:0; }
  .msg.user { flex-direction:row-reverse; }

  .msg-bubble { max-width:70%;padding:13px 16px;border-radius:16px;font-size:14px;line-height:1.7;font-weight:300; }
  .msg.nirvo .msg-bubble { background:rgba(232,160,160,0.06);border:1px solid rgba(232,160,160,0.18);color:rgba(255,255,255,0.85);border-radius:4px 16px 16px 16px; }
  .msg.user .msg-bubble { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border-radius:16px 4px 16px 16px; }

  .msg-avatar { width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700; }
  .msg.nirvo .msg-avatar { background:linear-gradient(135deg,#D4AF37,#F7C948);color:#000; }
  .msg.user .msg-avatar { background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6); }

  /* Feedback tag on NIRVO messages */
  .feedback-tag { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;margin-top:8px;margin-right:4px; }
  .tag-good { background:rgba(93,202,165,0.1);color:#5DCAA5;border:1px solid rgba(93,202,165,0.2); }
  .tag-improve { background:rgba(212,175,55,0.1);color:#D4AF37;border:1px solid rgba(212,175,55,0.2); }

  /* Typing indicator */
  .typing-indicator { display:flex;align-items:center;gap:4px;padding:12px 16px;background:rgba(232,160,160,0.05);border:1px solid rgba(232,160,160,0.15);border-radius:4px 16px 16px 16px;width:fit-content; }
  .typing-dot { width:6px;height:6px;border-radius:50%;background:#E8A0A0;opacity:0.7; }
  .typing-dot:nth-child(1){animation:typingDot 1s ease infinite}
  .typing-dot:nth-child(2){animation:typingDot 1s ease 0.2s infinite}
  .typing-dot:nth-child(3){animation:typingDot 1s ease 0.4s infinite}

  /* INPUT BAR */
  .input-bar { padding:16px 32px;border-top:0.5px solid rgba(255,255,255,0.06);background:rgba(8,8,8,0.95);flex-shrink:0; }
  .input-wrap { display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:10px 16px;transition:border-color 0.25s; }
  .input-wrap:focus-within { border-color:rgba(212,175,55,0.35); }

  #chat-input { flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:'Outfit',sans-serif;font-weight:300; }
  #chat-input::placeholder { color:rgba(255,255,255,0.2); }

  .mic-btn { width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0; }
  .mic-btn.idle { background:rgba(255,255,255,0.06);border:1px solid rgba(212,175,55,0.2); }
  .mic-btn.listening { background:linear-gradient(135deg,#D4AF37,#F7C948);position:relative; }
  .mic-btn.listening::after { content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(212,175,55,0.35);animation:pulseRing 1.5s ease infinite; }

  .send-btn { width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#D4AF37,#F7C948);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.25s;flex-shrink:0; }
  .send-btn:hover { transform:scale(1.05);box-shadow:0 4px 16px rgba(212,175,55,0.3); }
  .send-btn:disabled { opacity:0.4;cursor:not-allowed;transform:none; }

  /* ── Mobile + Blush ── */
  :root { --blush:#E8A0A0; }
  @media (max-width:768px) {
    .navbar { padding:10px 16px !important; }
    .nav-links-chat { display:none !important; }
    .mode-bar { flex-wrap:wrap !important; gap:6px !important; padding:10px 16px !important; justify-content:flex-start !important; }
    .avatar-panel { display:none !important; }
    .chat-area { width:100% !important; }
    .messages { padding:16px !important; }
    .input-bar { padding:12px 16px !important; }
    .msg-bubble { max-width:85% !important; font-size:14px !important; }
    .mode-btn { font-size:11px !important; padding:6px 12px !important; }
  }


  /* Mode badge */
  .mode-badge { display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px; }
</style>
</head>

        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div style="text-align:center;margin-top:8px;font-size:11px;color:rgba(255,255,255,0.18)">
        Press 🎤 to speak · NIRVO will respond with voice
      </div>
    </div>
  </div>
</div>

<script>
const GROQ_KEY = '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';
const { createClient } = supabase;
const sb = createClient('https://liixgxwpcxusocpixadt.supabase.co', 'sb_publishable_XCepI_R9piNQUZSlIcyDiw_ZFaxqzvd');

// ── State ──
let currentMode = 'coach';
let ttsEnabled = true;
let isListening = false;
let isSpeaking = false;
let recognition = null;
let chatHistory = [];
let userName = 'Student';
let userInitial = 'S';

// ── Build avatar wave ──
const waveHeights = [4,6,10,16,10,20,16,10,6,4,8,14,8,4];
const waveEl = document.getElementById('avatar-wave');
waveHeights.forEach((h,i) => {
  const b = document.createElement('div');
  b.className = 'avatar-wave-bar';
  b.style.height = '3px';
  b.style.animationDelay = (i*80) + 'ms';
  waveEl.appendChild(b);
});

// ── Auth ──
sb.auth.getSession().then(({ data: { session } }) => {
  if (!session) { window.location.href = 'auth.html'; return; }
  const user = session.user;
  userName = user.user_metadata?.first_name || user.email.split('@')[0];
  userInitial = userName[0].toUpperCase();
  document.getElementById('user-avatar').textContent = userInitial;
  startGreeting();
});

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── Mode ──
const modeConfigs = {
  coach: {
    label: '🎓 Speaking Coach',
    system: `You are NIRVO, a warm and encouraging female AI English speaking coach created by NIR Academy. Your role is to have natural conversations with students while gently correcting their English mistakes. 
    - Always respond in a friendly, encouraging tone
    - Keep responses concise (2-4 sentences max)
    - After each student response, give ONE brief piece of feedback on their English (pronunciation hint, grammar tip, or vocabulary suggestion)
    - Use simple clear English
    - Address the student by name occasionally
    - Current topic: {TOPIC}`
  },
  conversation: {
    label: '💬 Free Conversation',
    system: `You are NIRVO, a friendly and warm female AI companion from NIR Academy. Have natural, engaging conversations on any topic.
    - Be conversational, warm, and interesting
    - Ask follow-up questions to keep the conversation flowing
    - Keep responses concise (2-4 sentences)
    - Occasionally compliment the student's English naturally
    - Current topic: {TOPIC}`
  },
  roleplay: {
    label: '🎭 Roleplay',
    system: `You are NIRVO, playing a role in an English practice scenario for NIR Academy. 
    - Stay fully in character for the roleplay
    - The scenario is based on topic: {TOPIC}
    - For "Job Interview": you are the interviewer
    - For "Travel": you are a hotel receptionist / airport staff
    - For "Business": you are a business colleague
    - For "Daily Life": you are a friendly local
    - Keep responses natural and realistic (2-4 sentences)
    - After the roleplay exchange, add one quick tip in brackets [Tip: ...]`
  }
};

function setMode(btn, mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mode-indicator').textContent = modeConfigs[mode].label;
  chatHistory = [];
  clearMessages();
  startGreeting();
}

// ── Greeting ──
async function startGreeting() {
  const topic = document.getElementById('topic-select').value;
  const greetings = {
    coach: `Hi ${userName}! I'm NIRVO, your personal speaking coach. Today we'll practice **${topic}**. I'll chat with you naturally and give you helpful feedback on your English. Ready to begin? Tell me something about ${topic}! 😊`,
    conversation: `Hello ${userName}! I'm NIRVO. Let's have a wonderful conversation about **${topic}** today. I'd love to hear your thoughts — what comes to mind when you think about ${topic}?`,
    roleplay: `Hello ${userName}! Let's do a roleplay practice for **${topic}**. I'll play my role and you play yours. This will feel like a real situation! Let's begin — go ahead! 🎭`
  };
  addMessage('nirvo', greetings[currentMode]);
  speak(greetings[currentMode].replace(/\*\*/g,''));
}

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  await getNirvoResponse(text);
}

// ── Get Groq response ──
async function getNirvoResponse(userMsg) {
  const topic = document.getElementById('topic-select').value;
  const systemPrompt = modeConfigs[currentMode].system.replace('{TOPIC}', topic);

  setNirvoState('thinking');
  showTyping();

  chatHistory.push({ role:'user', content: userMsg });

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + GROQ_KEY },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [
          { role:'system', content: systemPrompt },
          ...chatHistory.slice(-10)
        ],
        temperature: 0.8,
        max_tokens: 200
      })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    chatHistory.push({ role:'assistant', content: reply });
    hideTyping();
    addMessage('nirvo', reply);
    setNirvoState('speaking');
    speak(reply.replace(/\*\*/g,'').replace(/\[.*?\]/g,''));
  } catch(e) {
    hideTyping();
    addMessage('nirvo', "I'm sorry, I had a little trouble connecting. Please try again! 😊");
    setNirvoState('idle');
  }
}

// ── TTS ──
function speak(text) {
  if (!ttsEnabled) { setNirvoState('idle'); return; }
  window.speechSynthesis.cancel();
  isSpeaking = true;
  setNirvoWave(true);

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.92;
  utterance.pitch = 1.1;
  utterance.volume = 1;

  // Pick best female voice
  const voices = window.speechSynthesis.getVoices();
  const femaleVoice = voices.find(v =>
    (v.name.includes('Samantha') || v.name.includes('Google US English') ||
     v.name.includes('Microsoft Zira') || v.name.includes('Female') ||
     v.name.toLowerCase().includes('female'))
  ) || voices.find(v => v.lang === 'en-US') || voices[0];

  if (femaleVoice) utterance.voice = femaleVoice;
  utterance.onend = () => { isSpeaking = false; setNirvoState('idle'); setNirvoWave(false); };
  utterance.onerror = () => { isSpeaking = false; setNirvoState('idle'); setNirvoWave(false); };
  window.speechSynthesis.speak(utterance);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const knob = document.getElementById('tts-knob');
  const toggle = document.getElementById('tts-toggle');
  const label = document.getElementById('tts-label');
  if (ttsEnabled) {
    knob.style.left = '2px';
    toggle.style.background = 'rgba(212,175,55,0.3)';
    label.textContent = 'ON';
    label.style.color = '#D4AF37';
  } else {
    knob.style.left = '18px';
    toggle.style.background = 'rgba(255,255,255,0.1)';
    label.textContent = 'OFF';
    label.style.color = 'rgba(255,255,255,0.3)';
    window.speechSynthesis.cancel();
  }
}

// ── Mic ──
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Please use Chrome for voice input.');
    return;
  }
  isListening ? stopListening() : startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').className = 'mic-btn listening';
    document.getElementById('chat-input').placeholder = 'Listening...';
    if (isSpeaking) window.speechSynthesis.cancel();
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('chat-input').value = text;
    stopListening();
    setTimeout(() => sendMessage(), 300);
  };

  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) recognition.stop();
  document.getElementById('mic-btn').className = 'mic-btn idle';
  document.getElementById('chat-input').placeholder = 'Type your message or press the mic to speak...';
}

// ── Avatar state ──
function setNirvoState(state) {
  const statusEl = document.getElementById('nirvo-status');
  const eyeL = document.getElementById('eye-l');
  const eyeR = document.getElementById('eye-r');
  if (state === 'thinking') {
    statusEl.textContent = 'Thinking...';
    eyeL.style.boxShadow = eyeR.style.boxShadow = '0 0 6px rgba(212,175,55,0.4)';
  } else if (state === 'speaking') {
    statusEl.textContent = 'Speaking...';
    document.getElementById('avatar-body').classList.add('speaking');
    eyeL.style.boxShadow = eyeR.style.boxShadow = '0 0 14px rgba(212,175,55,0.9)';
  } else {
    statusEl.textContent = 'Ready to help you';
    document.getElementById('avatar-body').classList.remove('speaking');
    eyeL.style.boxShadow = eyeR.style.boxShadow = '0 0 8px rgba(212,175,55,0.7)';
  }
}

function setNirvoWave(active) {
  const bars = document.querySelectorAll('.avatar-wave-bar');
  const heights = [4,6,10,16,10,20,16,10,6,4,8,14,8,4];
  bars.forEach((b,i) => {
    b.style.height = active ? heights[i]+'px' : '3px';
    active ? b.classList.add('active') : b.classList.remove('active');
  });
  document.getElementById('avatar-wave').style.opacity = active ? '1' : '0.3';
}

// ── Messages ──
function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'nirvo' ? 'N' : userInitial;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // Format text — bold **text**
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#D4AF37">$1</strong>')
    .replace(/\[(.*?)\]/g, '<div style="margin-top:8px;font-size:12px;color:rgba(212,175,55,0.7);font-style:italic">💡 $1</div>');
  bubble.innerHTML = formatted;

  el.appendChild(avatarEl);
  el.appendChild(bubble);

  const messagesEl = document.getElementById('messages');
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg nirvo';
  el.id = 'typing-msg';
  el.innerHTML = `
    <div class="msg-avatar" style="background:linear-gradient(135deg,#D4AF37,#F7C948);color:#000">N</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 999999;
}

function hideTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

function clearMessages() {
  document.getElementById('messages').innerHTML = '';
}

function clearChat() {
  chatHistory = [];
  clearMessages();
  startGreeting();
}

// Load voices on ready
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
