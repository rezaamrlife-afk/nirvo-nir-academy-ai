<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Debug</title>
<style>
  body { background:#111;color:#fff;font-family:monospace;padding:16px;font-size:13px; }
  button { background:#D4AF37;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:700;margin:4px; }
  #log { background:#000;padding:12px;border-radius:6px;margin-top:12px;height:60vh;overflow-y:auto;font-size:12px;line-height:1.8; }
  .ev   { color:#aaa; }
  .fin  { color:#5DCAA5; }
  .int  { color:#F7C948; }
  .dup  { color:#ff6b6b;font-weight:700; }
  .rst  { color:#E8A0A0; }
  .sep  { color:#444; }
</style>
</head>
<body>
<h3 style="color:#D4AF37">Speech Recognition Debug</h3>
<p style="color:#aaa;font-size:11px">Use on MOBILE — test duplication issue</p>

<button onclick="startRec()">🎤 Start</button>
<button onclick="stopRec()">⏹ Stop</button>
<button onclick="clearLog()">🗑 Clear</button>

<div>
  <b>fullTranscript:</b>
  <span id="full" style="color:#D4AF37"></span>
</div>

<div id="log"></div>

<script>
let recognition = null;
let isListening = false;
let fullTranscript = '';
let lastProcessedIndex = 0;
let restartCount = 0;
let seenFinals = new Set(); // track seen transcripts

function log(msg, cls='ev') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:2}) + ' ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function clearLog() {
  document.getElementById('log').innerHTML = '';
  fullTranscript = '';
  lastProcessedIndex = 0;
  restartCount = 0;
  seenFinals.clear();
  document.getElementById('full').textContent = '';
}

function startRec() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    log('ERROR: SpeechRecognition not supported', 'dup'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    log('--- onstart fired (restart #' + restartCount + ') ---', 'sep');
    log('  continuous=' + recognition.continuous + ' interimResults=' + recognition.interimResults, 'ev');
  };

  recognition.onresult = (e) => {
    log('--- onresult fired ---', 'sep');
    log('  e.resultIndex=' + e.resultIndex + ' e.results.length=' + e.results.length, 'ev');

    // Log ALL results in the array
    for (let i = 0; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      const isFinal = e.results[i].isFinal;
      const marker = i === e.resultIndex ? '→' : ' ';
      log('  ' + marker + ' [' + i + '] isFinal=' + isFinal + ' "' + t + '"', isFinal ? 'fin' : 'int');
    }

    // Current logic (same as practice.html)
    let final_old = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final_old += e.results[i][0].transcript + ' ';
    }

    // New logic with lastProcessedIndex
    let final_new = '';
    for (let i = Math.max(e.resultIndex, lastProcessedIndex); i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final_new += e.results[i][0].transcript + ' ';
        lastProcessedIndex = i + 1;
      }
    }

    // Check for duplicate content
    if (final_old.trim()) {
      const isDup = seenFinals.has(final_old.trim());
      if (isDup) {
        log('  ⚠ DUPLICATE DETECTED (old logic): "' + final_old.trim() + '"', 'dup');
      } else {
        seenFinals.add(final_old.trim());
        log('  ✓ New final (old logic): "' + final_old.trim() + '"', 'fin');
      }
    }

    if (final_new.trim() && final_new.trim() !== final_old.trim()) {
      log('  ✓ New final (new logic): "' + final_new.trim() + '"', 'fin');
    } else if (final_new.trim() === final_old.trim()) {
      log('  = Same result both logics', 'ev');
    }

    fullTranscript += final_old;
    document.getElementById('full').textContent = fullTranscript;
  };

  recognition.onerror = (e) => {
    log('--- onerror: ' + e.error + ' ---', 'dup');
  };

  recognition.onend = () => {
    log('--- onend fired (isListening=' + isListening + ') ---', 'rst');
    if (isListening) {
      restartCount++;
      log('  → restarting recognition (restart #' + restartCount + ')', 'rst');
      log('  lastProcessedIndex before restart: ' + lastProcessedIndex, 'ev');
      recognition.start();
    }
  };

  recognition.onspeechend = () => log('--- onspeechend fired ---', 'rst');
  recognition.onspeechstart = () => log('--- onspeechstart fired ---', 'ev');
  recognition.onaudiostart = () => log('--- onaudiostart fired ---', 'ev');
  recognition.onaudioend = () => log('--- onaudioend fired ---', 'rst');

  restartCount = 0;
  log('=== STARTING RECOGNITION ===', 'sep');
  recognition.start();
}

function stopRec() {
  isListening = false;
  if (recognition) recognition.stop();
  log('=== STOPPED ===', 'sep');
  log('Total restarts: ' + restartCount, 'rst');
  log('lastProcessedIndex: ' + lastProcessedIndex, 'ev');
  log('Final transcript: "' + fullTranscript.trim() + '"', 'fin');
}
</script>
</body>
</html>
